# =============================================================================
# CoVeX - Scénarios de Test & Validation Métier
# =============================================================================
# Version: 1.0.0
# Date: 2026-01-31
# Auteur: JBU (avec assistance BMAD Analyst)
# Projet: CoVeX (Complétude Vérification eXpert)
# =============================================================================

metadata:
  version: "1.7.0"
  date_creation: "2026-01-31"
  derniere_modification: "2026-02-01"
  auteur: "JBU"
  statut: "draft"
  description: |
    Référentiel complet des scénarios de test pour valider le moteur CoVeX.
    Couvre 6 cas d'usage MVP sur 3 secteurs avec 46 scénarios de test structurés.
    
    HISTORIQUE :
    v1.1.0 : Ajout scénarios personas CP et Cli pour alignement avec Product Brief.
    v1.2.0 : Renommage des personas et scénarios avec noms positifs et bienveillants.
    v1.3.0 : Nouveaux codes personas fun : GO, VOX, ZAP, NEW.
    v1.4.0 : Rééquilibrage répartition scénarios par persona (5-6 chacun).
    v1.5.0 : Extension 3 secteurs (Entreprise, Communes, Construction) avec 3 nouveaux 
             personas (CIT, MOA, OPS) et 15 nouveaux scénarios.
    v1.6.0 : Romandisation complète - Adaptation au contexte Suisse romande (VD, GE, VS)
             avec toponymes, patronymes, vocabulaire administratif, normes SIA/Minergie,
             références en CHF et contexte PME/communes romandes.
    v1.7.0 : Extension Communes VD/FR - Ajout de 9 scénarios spécifiques aux cantons
             de Vaud et Fribourg : Contrôle des habitants (3), Naturalisations (3),
             Aides et subventions (3). Total : 46 scénarios.
    
  secteurs_couverts:
    - nom: "Entreprise (IT/Interne)"
      domaines: ["Tickets Support IT", "Demandes d'Achat", "Comptes-Rendus d'Intervention"]
      personas: ["GO", "VOX", "ZAP", "NEW"]
      contexte_regional: "PME romandes, fiduciaires, sociétés de services"
    - nom: "Communes (Service Public)"
      domaines: ["Demandes Citoyennes", "Contrôle des Habitants", "Naturalisations", "Aides et Subventions"]
      personas: ["CIT"]
      contexte_regional: "Communes vaudoises et fribourgeoises - Guichet unique, contrôle des habitants, naturalisations, subventions"
    - nom: "Construction (BTP)"
      domaines: ["Demandes de Devis", "Rapports de Chantier"]
      personas: ["MOA", "OPS"]
      contexte_regional: "Normes SIA, Minergie, permis de construire cantonaux, entreprises générales romandes"
  
  statistiques:
    total_scenarios: 46
    total_prompts_metier: 6
    total_personas: 7
    scenarios_par_secteur:
      entreprise: 22
      communes: 14
      construction: 10

# =============================================================================
# SECTION 1 : CONFIGURATION GLOBALE
# =============================================================================

configuration:
  echelle_scoring:
    min: 0
    max: 100
    seuils:
      ko:
        min: 0
        max: 30
        decision: "KO"
        label: "Inutilisable"
        description: "Informations critiques manquantes, nécessite réécriture complète"
      partiel:
        min: 31
        max: 70
        decision: "PARTIEL"
        label: "Exploitable avec effort"
        description: "Clarifications nécessaires, traitement possible mais ralenti"
      ok:
        min: 71
        max: 100
        decision: "OK"
        label: "Acceptable"
        description: "Informations essentielles présentes, traitement standard"

  format_output:
    champs_obligatoires:
      - score
      - decision
      - justification
    champs_optionnels:
      - qualite_redaction
      - alertes
      - recommandations

# =============================================================================
# SECTION 2 : MÉTRIQUES KPI & CRITÈRES DE SUCCÈS
# =============================================================================

kpi:
  # ---------------------------------------------------------------------------
  # KPI 1 : Qualité d'Évaluation (Précision du Scoring)
  # ---------------------------------------------------------------------------
  qualite_evaluation:
    id: "KPI-001"
    nom: "Précision du Scoring"
    description: "Mesure la concordance entre le score CoVeX et l'évaluation humaine de référence"
    
    metriques:
      correlation_score:
        nom: "Corrélation Score Humain/Machine"
        formule: "Coefficient de Pearson entre scores CoVeX et scores experts"
        unite: "coefficient [-1, 1]"
        seuil_minimum: 0.80
        seuil_cible: 0.90
        seuil_excellent: 0.95
        methode_mesure: |
          1. Constituer un panel de 3 experts métier minimum par domaine
          2. Faire évaluer les 16 scénarios de test par chaque expert (score 0-100)
          3. Calculer le score moyen expert par scénario
          4. Calculer le coefficient de Pearson avec les scores CoVeX
          
      accord_decision:
        nom: "Taux d'Accord sur la Décision"
        formule: "(Nombre de décisions identiques / Total scénarios) × 100"
        unite: "pourcentage"
        seuil_minimum: 85
        seuil_cible: 92
        seuil_excellent: 98
        methode_mesure: |
          Comparer la décision CoVeX (KO/PARTIEL/OK) avec la décision majoritaire des experts
          
  # ---------------------------------------------------------------------------
  # KPI 2 : Cohérence Interne
  # ---------------------------------------------------------------------------
  coherence_interne:
    id: "KPI-002"
    nom: "Cohérence Interne du Moteur"
    description: "Vérifie que le moteur produit des résultats logiquement cohérents"
    
    metriques:
      monotonie_score:
        nom: "Respect de la Monotonie"
        formule: "Score(minimaliste) < Score(partiel) < Score(complet) pour chaque domaine"
        unite: "booléen (PASS/FAIL)"
        seuil_minimum: "PASS sur 100% des triplets"
        methode_mesure: |
          Vérifier pour chaque cas d'usage que :
          - Scénario minimaliste < Scénario partiel < Scénario complet
          Triplets à tester : [1.1,1.2,1.3], [2.1,2.2,2.3], [3.1,3.2,3.3]
          
      resistance_bruit:
        nom: "Résistance au Bruit Textuel"
        formule: "Score(verbeux_hors_sujet) < Score(partiel_pertinent)"
        unite: "booléen (PASS/FAIL)"
        seuil_minimum: "PASS sur 100% des paires"
        methode_mesure: |
          Vérifier que la quantité de texte ne compense pas le manque de qualité
          Paires à tester : [1.4 < 1.2], [2.4 < 2.2], [3.4 < 3.2]
          
      coherence_score_decision:
        nom: "Cohérence Score/Décision"
        formule: "Décision conforme aux seuils configurés"
        unite: "pourcentage"
        seuil_minimum: 100
        methode_mesure: |
          Vérifier que pour chaque scénario :
          - Score 0-30 → Décision KO
          - Score 31-70 → Décision PARTIEL  
          - Score 71+ → Décision OK
          
      reproductibilite:
        nom: "Reproductibilité des Résultats"
        formule: "Écart-type des scores sur N exécutions identiques"
        unite: "points de score"
        seuil_minimum: 5
        seuil_cible: 3
        seuil_excellent: 1
        methode_mesure: |
          Exécuter chaque scénario 10 fois avec le même prompt métier
          Calculer l'écart-type des scores obtenus

  # ---------------------------------------------------------------------------
  # KPI 3 : Performance Technique
  # ---------------------------------------------------------------------------
  performance_technique:
    id: "KPI-003"
    nom: "Performance d'Inférence"
    description: "Mesure la performance technique du moteur SLM local"
    
    metriques:
      latence_inference:
        nom: "Temps de Réponse"
        formule: "Temps entre soumission du texte et retour du résultat complet"
        unite: "secondes"
        seuil_minimum: 10
        seuil_cible: 5
        seuil_excellent: 2
        conditions: "Texte d'entrée < 500 tokens, machine standard (16GB RAM, CPU moderne)"
        methode_mesure: |
          Mesurer le temps de traitement pour chaque scénario de test
          Calculer P50, P90, P99 sur l'ensemble des scénarios
          
      consommation_memoire:
        nom: "Consommation Mémoire RAM"
        formule: "Pic de consommation mémoire pendant l'inférence"
        unite: "GB"
        seuil_minimum: 12
        seuil_cible: 8
        seuil_excellent: 6
        conditions: "Modèle SLM chargé en mémoire"
        
      souverainete:
        nom: "Conformité Souveraineté"
        formule: "Nombre de requêtes vers API cloud externes"
        unite: "count"
        seuil_minimum: 0
        seuil_cible: 0
        seuil_excellent: 0
        methode_mesure: |
          Monitorer le trafic réseau pendant l'exécution des tests
          Vérifier qu'aucune donnée n'est envoyée vers des serveurs externes

  # ---------------------------------------------------------------------------
  # KPI 4 : Valeur Métier (Impact Utilisateur)
  # ---------------------------------------------------------------------------
  valeur_metier:
    id: "KPI-004"
    nom: "Impact Métier Mesurable"
    description: "Mesure l'impact réel sur les processus métier (test terrain)"
    
    metriques:
      reduction_iterations:
        nom: "Réduction des Allers-Retours"
        formule: "((Iterations_avant - Iterations_après) / Iterations_avant) × 100"
        unite: "pourcentage de réduction"
        seuil_minimum: 30
        seuil_cible: 50
        seuil_excellent: 70
        periode_mesure: "2 semaines minimum"
        methode_mesure: |
          Comparer le nombre moyen d'échanges de clarification :
          - Période contrôle (sans CoVeX) : 2 semaines
          - Période test (avec CoVeX) : 2 semaines
          
      progression_score_moyen:
        nom: "Progression du Score Moyen"
        formule: "Score_moyen_fin_periode - Score_moyen_debut_periode"
        unite: "points"
        seuil_minimum: 15
        seuil_cible: 25
        seuil_excellent: 35
        methode_mesure: |
          Suivre l'évolution du score moyen des soumissions sur la période de test
          Mesurer l'effet d'apprentissage des utilisateurs
          
      taux_first_time_right:
        nom: "Taux de Complétude Premier Jet"
        formule: "(Soumissions avec score >= 70 dès le premier envoi / Total soumissions) × 100"
        unite: "pourcentage"
        seuil_minimum: 40
        seuil_cible: 60
        seuil_excellent: 80
        methode_mesure: |
          Mesurer le pourcentage de textes acceptables dès la première soumission
          après introduction de CoVeX
          
      satisfaction_utilisateur:
        nom: "Satisfaction Utilisateur"
        formule: "Score NPS ou CSAT sur l'expérience CoVeX"
        unite: "score NPS [-100, 100] ou CSAT [1-5]"
        seuil_minimum_nps: 20
        seuil_cible_nps: 40
        seuil_excellent_nps: 60
        methode_mesure: |
          Enquête auprès des utilisateurs après la période de test
          Questions sur : utilité perçue, facilité d'usage, recommandation

  # ---------------------------------------------------------------------------
  # KPI 5 : Qualité du Feedback Généré
  # ---------------------------------------------------------------------------
  qualite_feedback:
    id: "KPI-005"
    nom: "Qualité des Retours Générés"
    description: "Évalue la pertinence et l'actionnabilité du feedback CoVeX"
    
    metriques:
      pertinence_justification:
        nom: "Pertinence de la Justification"
        formule: "Note moyenne des experts sur la justification (échelle 1-5)"
        unite: "score [1-5]"
        seuil_minimum: 3.5
        seuil_cible: 4.0
        seuil_excellent: 4.5
        methode_mesure: |
          Faire évaluer par des experts la pertinence des justifications générées
          Critères : exactitude, clarté, utilité pour l'amélioration
          
      absence_hallucination:
        nom: "Absence d'Hallucination"
        formule: "(Évaluations sans erreur factuelle / Total évaluations) × 100"
        unite: "pourcentage"
        seuil_minimum: 95
        seuil_cible: 99
        seuil_excellent: 100
        methode_mesure: |
          Vérifier que CoVeX ne demande pas d'informations :
          - Déjà présentes dans le texte
          - Incohérentes avec le contexte
          - Inventées ou non pertinentes

# =============================================================================
# SECTION 3 : PROMPTS MÉTIER DE RÉFÉRENCE
# =============================================================================

prompts_metier:
  # ---------------------------------------------------------------------------
  # Prompt : Tickets Support IT
  # ---------------------------------------------------------------------------
  tickets_support_it:
    id: "PROMPT-001"
    nom: "Ticket Support IT"
    domaine: "Support Informatique"
    version: "1.0"
    
    prompt: |
      Tu es un expert en évaluation de la complétude des tickets de support informatique.
      
      Un ticket support IT complet et exploitable doit contenir les éléments suivants :
      
      ÉLÉMENTS CRITIQUES (absence = score < 30) :
      1. Identification de l'équipement concerné (type : PC, portable, imprimante, etc.)
      2. Description du problème ou symptôme observé
      
      ÉLÉMENTS IMPORTANTS (absence = score < 60) :
      3. Système d'exploitation et version
      4. Application concernée et version (si applicable)
      5. Message d'erreur exact (texte ou code) si affiché
      6. Contexte de survenue (quand le problème apparaît, après quelle action)
      
      ÉLÉMENTS SOUHAITABLES (pour score > 80) :
      7. Impact sur le travail (bloquant / gênant / mineur)
      8. Actions déjà tentées par l'utilisateur
      9. Modèle précis de l'équipement
      10. Fréquence du problème (permanent / intermittent / occasionnel)
      
      Évalue le texte soumis et retourne :
      - Un score de 0 à 100
      - Une décision (KO si score <= 30, PARTIEL si 31-70, OK si > 70)
      - Une justification claire de l'évaluation
      
    elements_evaluation:
      critiques:
        - id: "equipement"
          label: "Identification équipement"
          poids: 20
          exemples_valides: ["PC portable", "Dell Latitude 5520", "imprimante réseau"]
        - id: "symptome"
          label: "Description du problème"
          poids: 20
          exemples_valides: ["ne démarre plus", "écran bleu", "erreur à l'ouverture"]
      importants:
        - id: "os_version"
          label: "Système d'exploitation"
          poids: 12
        - id: "application"
          label: "Application concernée"
          poids: 10
        - id: "erreur"
          label: "Message d'erreur"
          poids: 10
        - id: "contexte"
          label: "Contexte de survenue"
          poids: 8
      souhaitables:
        - id: "impact"
          label: "Impact sur le travail"
          poids: 6
        - id: "actions_tentees"
          label: "Actions déjà tentées"
          poids: 6
        - id: "modele_precis"
          label: "Modèle équipement"
          poids: 4
        - id: "frequence"
          label: "Fréquence du problème"
          poids: 4

  # ---------------------------------------------------------------------------
  # Prompt : Demandes d'Achat
  # ---------------------------------------------------------------------------
  demandes_achat:
    id: "PROMPT-002"
    nom: "Demande d'Achat Interne"
    domaine: "Achats / Approvisionnement"
    version: "1.0"
    
    prompt: |
      Tu es un expert en évaluation de la complétude des demandes d'achat internes.
      
      Une demande d'achat complète et traitable doit contenir les éléments suivants :
      
      ÉLÉMENTS CRITIQUES (absence = score < 30) :
      1. Nature de l'article ou service demandé
      2. Justification du besoin (pourquoi, pour quel usage)
      
      ÉLÉMENTS IMPORTANTS (absence = score < 60) :
      3. Spécifications techniques ou référence produit
      4. Quantité souhaitée
      5. Budget estimé ou plafond autorisé
      6. Bénéficiaire (pour qui / quel service)
      
      ÉLÉMENTS SOUHAITABLES (pour score > 80) :
      7. Niveau d'urgence et date limite souhaitée
      8. Fournisseur suggéré (si connu)
      9. Code projet ou imputation budgétaire
      10. Alternatives acceptables
      
      Évalue le texte soumis et retourne :
      - Un score de 0 à 100
      - Une décision (KO si score <= 30, PARTIEL si 31-70, OK si > 70)
      - Une justification claire de l'évaluation
      
    elements_evaluation:
      critiques:
        - id: "article"
          label: "Nature article/service"
          poids: 20
        - id: "justification"
          label: "Justification du besoin"
          poids: 20
      importants:
        - id: "specifications"
          label: "Spécifications/Référence"
          poids: 12
        - id: "quantite"
          label: "Quantité"
          poids: 8
        - id: "budget"
          label: "Budget estimé"
          poids: 12
        - id: "beneficiaire"
          label: "Bénéficiaire"
          poids: 8
      souhaitables:
        - id: "urgence"
          label: "Urgence/Deadline"
          poids: 6
        - id: "fournisseur"
          label: "Fournisseur suggéré"
          poids: 4
        - id: "imputation"
          label: "Code projet/Budget"
          poids: 5
        - id: "alternatives"
          label: "Alternatives acceptables"
          poids: 5

  # ---------------------------------------------------------------------------
  # Prompt : Comptes-Rendus d'Intervention
  # ---------------------------------------------------------------------------
  cr_intervention:
    id: "PROMPT-003"
    nom: "Compte-Rendu d'Intervention Terrain"
    domaine: "Maintenance / Services Terrain"
    version: "1.0"
    
    prompt: |
      Tu es un expert en évaluation de la complétude des comptes-rendus d'intervention.
      
      Un compte-rendu d'intervention complet et exploitable doit contenir les éléments suivants :
      
      ÉLÉMENTS CRITIQUES (absence = score < 30) :
      1. Identification client/site (nom, référence)
      2. Actions réalisées (description des opérations effectuées)
      
      ÉLÉMENTS IMPORTANTS (absence = score < 60) :
      3. Date et durée de l'intervention
      4. Objet/motif de l'intervention
      5. Constat initial à l'arrivée
      6. État de fonctionnement au départ
      
      ÉLÉMENTS SOUHAITABLES (pour score > 80) :
      7. Pièces/matériaux utilisés ou remplacés (avec références)
      8. Mesures ou relevés effectués
      9. Recommandations ou alertes pour le futur
      10. Validation/signature client
      
      Évalue le texte soumis et retourne :
      - Un score de 0 à 100
      - Une décision (KO si score <= 30, PARTIEL si 31-70, OK si > 70)
      - Une justification claire de l'évaluation
      
    elements_evaluation:
      critiques:
        - id: "client_site"
          label: "Identification client/site"
          poids: 15
        - id: "actions"
          label: "Actions réalisées"
          poids: 25
      importants:
        - id: "date_duree"
          label: "Date et durée"
          poids: 10
        - id: "objet"
          label: "Objet intervention"
          poids: 10
        - id: "constat"
          label: "Constat initial"
          poids: 10
        - id: "etat_final"
          label: "État au départ"
          poids: 10
      souhaitables:
        - id: "pieces"
          label: "Pièces utilisées"
          poids: 6
        - id: "mesures"
          label: "Mesures/Relevés"
          poids: 5
        - id: "recommandations"
          label: "Recommandations"
          poids: 5
        - id: "validation"
          label: "Validation client"
          poids: 4

  # ---------------------------------------------------------------------------
  # Prompt : Demandes Citoyennes (Communes)
  # ---------------------------------------------------------------------------
  demandes_citoyennes:
    id: "PROMPT-004"
    nom: "Demande Citoyenne"
    domaine: "Service Public / Communes"
    version: "1.1"
    
    prompt: |
      Tu es un expert en évaluation de la complétude des demandes citoyennes adressées aux services communaux en Suisse romande.
      
      Une demande citoyenne complète et traitable doit contenir les éléments suivants :
      
      ÉLÉMENTS CRITIQUES (absence = score < 30) :
      1. Nature de la demande (type de démarche ou service sollicité)
      2. Identification du demandeur (nom, prénom, ou référence dossier)
      
      ÉLÉMENTS IMPORTANTS (absence = score < 60) :
      3. Adresse complète du demandeur ou du lieu concerné
      4. Coordonnées de contact (téléphone ou email)
      5. Motif ou justification de la demande
      6. Pièces jointes mentionnées ou fournies (si applicable)
      
      ÉLÉMENTS SOUHAITABLES (pour score > 80) :
      7. Dates pertinentes (date souhaitée, date de l'événement, échéance)
      8. Numéro de dossier existant (si suite de démarche)
      9. Situation familiale ou professionnelle (si pertinent)
      10. Précisions complémentaires facilitant le traitement
      
      Évalue le texte soumis et retourne :
      - Un score de 0 à 100
      - Une décision (KO si score <= 30, PARTIEL si 31-70, OK si > 70)
      - Une justification claire et bienveillante
      
      IMPORTANT : Adopte un ton accueillant et pédagogique, adapté au grand public.
      CONTEXTE SUISSE : Vocabulaire adapté (Commune, Syndic, Contrôle des habitants, permis de séjour, AVS, etc.)
      
    elements_evaluation:
      critiques:
        - id: "nature_demande"
          label: "Nature de la demande"
          poids: 20
          exemples_valides: ["annonce d'arrivée", "demande de permis de construire", "signalement voirie", "inscription école"]
        - id: "identite"
          label: "Identification demandeur"
          poids: 20
      importants:
        - id: "adresse"
          label: "Adresse complète"
          poids: 12
        - id: "contact"
          label: "Coordonnées contact"
          poids: 10
        - id: "motif"
          label: "Motif/Justification"
          poids: 10
        - id: "pieces"
          label: "Pièces jointes"
          poids: 8
      souhaitables:
        - id: "dates"
          label: "Dates pertinentes"
          poids: 6
        - id: "reference_dossier"
          label: "Numéro dossier existant"
          poids: 5
        - id: "situation"
          label: "Situation familiale/pro"
          poids: 5
        - id: "precisions"
          label: "Précisions complémentaires"
          poids: 4

  # ---------------------------------------------------------------------------
  # Prompt : Demandes de Devis Construction
  # ---------------------------------------------------------------------------
  demandes_devis_construction:
    id: "PROMPT-005"
    nom: "Demande de Devis Construction"
    domaine: "BTP / Construction"
    version: "1.1"
    
    prompt: |
      Tu es un expert en évaluation de la complétude des demandes de devis pour travaux de construction/rénovation en Suisse romande.
      
      Une demande de devis complète et chiffrable doit contenir les éléments suivants :
      
      ÉLÉMENTS CRITIQUES (absence = score < 30) :
      1. Nature des travaux souhaités (construction, extension, rénovation, type d'ouvrage)
      2. Localisation du chantier (adresse ou commune)
      
      ÉLÉMENTS IMPORTANTS (absence = score < 60) :
      3. Surface ou dimensions approximatives
      4. Description du projet (usage prévu, nombre de pièces, étages...)
      5. Budget indicatif ou fourchette envisagée
      6. Délai souhaité ou contraintes de planning
      
      ÉLÉMENTS SOUHAITABLES (pour score > 80) :
      7. État actuel du bien (neuf, existant, à démolir)
      8. Contraintes techniques connues (terrain, accès, mitoyenneté)
      9. Permis ou autorisations en cours/obtenus (mise à l'enquête, permis de construire)
      10. Coordonnées complètes et disponibilités pour visite
      
      Évalue le texte soumis et retourne :
      - Un score de 0 à 100
      - Une décision (KO si score <= 30, PARTIEL si 31-70, OK si > 70)
      - Une justification claire de l'évaluation
      
      CONTEXTE SUISSE : Normes SIA, labels Minergie, permis de construire cantonaux, mise à l'enquête publique.
      
    elements_evaluation:
      critiques:
        - id: "nature_travaux"
          label: "Nature des travaux"
          poids: 20
          exemples_valides: ["extension 30m²", "réfection toiture", "construction garage", "rénovation énergétique Minergie"]
        - id: "localisation"
          label: "Localisation chantier"
          poids: 20
      importants:
        - id: "dimensions"
          label: "Surface/Dimensions"
          poids: 12
        - id: "description"
          label: "Description projet"
          poids: 10
        - id: "budget"
          label: "Budget indicatif"
          poids: 10
        - id: "delai"
          label: "Délai souhaité"
          poids: 8
      souhaitables:
