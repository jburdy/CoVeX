          label: "Conditions météo"
          poids: 8
        - id: "avancement"
          label: "État d'avancement"
          poids: 12
      souhaitables:
        - id: "materiaux"
          label: "Matériaux"
          poids: 6
        - id: "incidents"
          label: "Incidents/Difficultés"
          poids: 7
        - id: "previsions"
          label: "Prévisions J+1"
          poids: 6
        - id: "photos"
          label: "Photos/Documentation"
          poids: 6

