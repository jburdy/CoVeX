# =============================================================================
# SECTION 5 : PROTOCOLE DE VALIDATION
# =============================================================================

protocole_validation:
  # ---------------------------------------------------------------------------
  # Phase 1 : Tests Automatisés
  # ---------------------------------------------------------------------------
  phase_1_automatique:
    nom: "Validation Automatique - Cohérence Interne"
    duree_estimee: "1 jour"
    prerequis:
      - "Moteur CoVeX fonctionnel"
      - "API opérationnelle"
      - "Prompts métier configurés"
    
    tests:
      monotonie:
        description: "Vérifier Score(minimaliste) < Score(partiel) < Score(complet)"
        triplets:
          # Secteur Entreprise
          - ["TC-IT-001", "TC-IT-002", "TC-IT-003"]
          - ["TC-ACH-001", "TC-ACH-002", "TC-ACH-003"]
          - ["TC-CR-001", "TC-CR-002", "TC-CR-003"]
          # Secteur Communes - Original
          - ["TC-CIT-001", "TC-CIT-002", "TC-CIT-003"]
          # Secteur Communes - Contrôle habitants VD/FR
          - ["TC-CIT-006", "TC-CIT-007", "TC-CIT-008"]
          # Secteur Communes - Naturalisations VD/FR
          - ["TC-CIT-009", "TC-CIT-010", "TC-CIT-011"]
          # Secteur Communes - Subventions VD/FR
          - ["TC-CIT-012", "TC-CIT-013", "TC-CIT-014"]
          # Secteur Construction
          - ["TC-MOA-001", "TC-MOA-002", "TC-MOA-003"]
          - ["TC-OPS-001", "TC-OPS-002", "TC-OPS-003"]
        critere: "PASS si ordre respecté pour 100% des triplets (10 triplets)"
        
      resistance_bruit:
        description: "Vérifier Score(verbeux) < Score(partiel_pertinent)"
        paires:
          # Secteur Entreprise
          - ["TC-IT-004", "TC-IT-002"]
          - ["TC-ACH-004", "TC-ACH-002"]
          - ["TC-CR-004", "TC-CR-002"]
          # Secteur Communes (signalement vague vs demande standard)
          - ["TC-CIT-004", "TC-CIT-002"]
          # Secteur Construction (demande multi-lots vs partielle)
          - ["TC-MOA-005", "TC-MOA-002"]
          # Secteur Construction (rapport incident vs standard)
          - ["TC-OPS-004", "TC-OPS-002"]
        critere: "PASS si inégalité respectée pour 100% des paires (6 paires)"
        
      coherence_decision:
        description: "Vérifier cohérence score/décision selon seuils"
        tous_scenarios: true
        critere: "PASS si 100% conforme aux seuils configurés"
        
      reproductibilite:
        description: "Exécuter 10 fois chaque scénario"
        iterations: 10
        critere: "PASS si écart-type < 5 points pour tous les scénarios"

  # ---------------------------------------------------------------------------
  # Phase 2 : Validation Expert Métier
  # ---------------------------------------------------------------------------
  phase_2_expert:
    nom: "Validation Humaine - Concordance Expert"
    duree_estimee: "1 semaine"
    
    panel_experts:
      composition:
        # Secteur Entreprise
        - role: "Responsable Support IT"
          scenarios: ["TC-IT-*"]
          nombre: 2
          contexte: "PME romande, fiduciaire ou société de services"
        - role: "Responsable Achats"
          scenarios: ["TC-ACH-*"]
          nombre: 2
          contexte: "PME romande"
        - role: "Chef d'équipe Maintenance"
          scenarios: ["TC-CR-*"]
          nombre: 2
          contexte: "Entreprise de services techniques romande"
        # Secteur Communes
        - role: "Collaborateur administratif / Contrôle des habitants"
          scenarios: ["TC-CIT-*"]
          nombre: 2
          contexte: "Commune vaudoise, genevoise ou valaisanne"
        # Secteur Construction
        - role: "Chargé d'affaires BTP / Commercial construction"
          scenarios: ["TC-MOA-*"]
          nombre: 2
          contexte: "Entreprise générale ou architecte romand"
        - role: "Conducteur de travaux / Chef de chantier"
          scenarios: ["TC-OPS-*"]
          nombre: 2
          contexte: "Entreprise de construction romande"
      
    protocole:
      etape_1:
        action: "Présenter les textes INPUT sans les scores CoVeX"
        livrables: "Grille d'évaluation vierge"
      etape_2:
        action: "Expert note chaque texte de 0 à 100"
        livrables: "Scores experts"
      etape_3:
        action: "Expert indique décision KO/PARTIEL/OK"
        livrables: "Décisions experts"
      etape_4:
        action: "Comparer avec outputs CoVeX"
        livrables: "Rapport de concordance"
    
    criteres_validation:
      correlation_score:
        seuil: 0.85
        methode: "Coefficient de Pearson"
      accord_decision:
        seuil: 90
        unite: "pourcentage"

  # ---------------------------------------------------------------------------
  # Phase 3 : Test Terrain
  # ---------------------------------------------------------------------------
  phase_3_terrain:
    nom: "Validation Utilisateur - Impact Réel"
    duree_estimee: "4 semaines (2 contrôle + 2 test)"
    
    setup:
      periode_controle:
        duree: "2 semaines"
        description: "Collecte baseline sans CoVeX"
        mesures:
          - "Nombre moyen d'allers-retours par ticket/demande/CR"
          - "Temps moyen de traitement"
          - "Taux de rejet/renvoi"
      
      periode_test:
        duree: "2 semaines"
        description: "Activation CoVeX en mode feedback"
        mesures:
          - "Score moyen initial"
          - "Score moyen après correction"
          - "Nombre d'allers-retours"
          - "Temps de traitement"
          - "Satisfaction utilisateur"
    
    volume_cible:
      # Secteur Entreprise
      tickets_it: "50-100 tickets"
      demandes_achat: "30-50 demandes"
      cr_intervention: "40-60 comptes-rendus"
      # Secteur Communes
      demandes_citoyennes: "30-50 demandes"
      # Secteur Construction
      demandes_devis: "20-40 demandes"
      rapports_chantier: "30-50 rapports"
    
    criteres_succes:
      reduction_iterations:
        seuil: 30
        cible: 50
        unite: "pourcentage de réduction"
      progression_score:
        seuil: 15
        cible: 25
        unite: "points"
      satisfaction:
        seuil: 3.5
        cible: 4.0
        unite: "score CSAT /5"

# =============================================================================
# SECTION 6 : TABLEAU DE BORD DE SUIVI
# =============================================================================

tableau_bord:
  kpi_summary:
    - kpi_id: "KPI-001"
      nom: "Qualité d'Évaluation"
      indicateur_principal: "correlation_score"
      seuil_alerte: 0.80
      seuil_cible: 0.90
      statut: "À MESURER"
      
    - kpi_id: "KPI-002"
