  checklist_mvp:
    - critere: "6 cas d'usage fonctionnels sur 3 secteurs"
      statut: "À VALIDER"
      scenarios_requis: 
        secteur_entreprise: ["TC-IT-*", "TC-ACH-*", "TC-CR-*"]
        secteur_communes: ["TC-CIT-*"]
        secteur_construction: ["TC-MOA-*", "TC-OPS-*"]
      
    - critere: "Validation métier positive"
      statut: "À VALIDER"
      condition: "Corrélation expert > 0.85 sur les 3 secteurs"
      
    - critere: "Stabilité locale"
      statut: "À VALIDER"
      condition: "0 requête cloud, latence < 10s"
      
    - critere: "Résultats actionnables"
      statut: "À VALIDER"
      condition: "Score pertinence > 3.5/5"
      
    - critere: "Couverture personas"
      statut: "À VALIDER"
      condition: "7 personas couverts (GO, VOX, ZAP, NEW, CIT, MOA, OPS)"
