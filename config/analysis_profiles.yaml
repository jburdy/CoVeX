          - criterion_id: "situation"
            extraction_text: "plusieurs devoirs non rendus et deux oublis de materiel"
          - criterion_id: "historique"
            extraction_text: "Appel avec la maman lundi dernier et mise en place d'un tableau de suivi en classe"
          - criterion_id: "suite"
            extraction_text: "Prochaine etape : point avec la psychologue scolaire vendredi"
      - text: "Concernant Yanis, entretien fait avec les parents hier apres l'incident de recreation. L'eleve s'est excuse et un nouveau point est prevu dans deux semaines avec l'enseignante titulaire."
        extractions:
          - criterion_id: "eleve"
            extraction_text: "Yanis"
          - criterion_id: "situation"
            extraction_text: "incident de recreation"
          - criterion_id: "historique"
            extraction_text: "entretien fait avec les parents hier"
          - criterion_id: "suite"
            extraction_text: "un nouveau point est prevu dans deux semaines avec l'enseignante titulaire"
    coverage_item:
      - id: "eleve"
        expected_info: "Nom de l'eleve, classe ou groupe concerne."
        weight: 0.25
      - id: "situation"
        expected_info: "Difficulte, incident ou observation principale detaillee."
        weight: 0.25
      - id: "historique"
        expected_info: "Faits, dates ou actions deja realisees."
        weight: 0.25
      - id: "suite"
        expected_info: "Mesure demandee ou prochaine etape specifique."
        weight: 0.25

