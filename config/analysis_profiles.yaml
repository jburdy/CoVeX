          - criterion_id: "eleve"
            extraction_text: "Tom, 6P"
          - criterion_id: "situation"
            extraction_text: "a eu beaucoup de peine a rester concentre cette semaine en mathematiques"
      - text: "Suivi Lea Martin, 8P. Depuis le 10 janvier, plusieurs devoirs non rendus et deux oublis de materiel. Appel avec la maman lundi dernier et mise en place d'un tableau de suivi en classe. Prochaine etape : point avec la psychologue scolaire vendredi."
