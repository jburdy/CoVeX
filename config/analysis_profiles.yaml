          - criterion_id: "avancement"
            extraction_text: "la moitie des comptes clients a ete migree avec succes sans perte de donnee (1500 comptes)"
          - criterion_id: "blocage"
            extraction_text: "on n'a toujours pas recu les cles API du fournisseur marketing pour l'etape 2, ce qui bloque l'envoi des newsletters"
          - criterion_id: "suite"
            extraction_text: "Marc doit appeler le support du fournisseur ce jeudi, et on fera un test d'integration partiel vendredi matin"
    coverage_item:
      - id: "projet"
        expected_info: "Projet, sprint ou jalon concerne clairement identifie."
