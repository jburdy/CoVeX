default_inference_engine: "remote_groq_llama31_8b_instant"
inference_engines:
  # `cost_score` is a relative score used for comparisons inside CoVeX.
  # Higher means more expensive; lower means cheaper.

  # Local models, ordered from cheapest to most demanding.
  # Local `cost_score` values are relative estimates based on model size,
  # expected memory pressure, and the practical runtime cost on a local Ollama node.

  local_llama32:
    type: "local"
    model: "llama3.2:3b"
    justification: "rapide, tres leger, essais"
    cost_score: 5
    base_url: "http://127.0.0.1:11434"
    timeout_sec: 120

  local_qwen3_4b:
    type: "local"
    model: "qwen3:4b"
    justification: "compact, extraction simple, sorties stables"
    cost_score: 7
    base_url: "http://127.0.0.1:11434"
    timeout_sec: 120

  local_gemma4_e4b:
    type: "local"
    model: "gemma4:e4b"
    justification: "compact, recent, qualite/latence"
    cost_score: 8
    base_url: "http://127.0.0.1:11434"
    timeout_sec: 120

  local_ministral:
    type: "local"
    model: "ministral-3:8b"
    justification: "equilibre, qualite, memoire"
    cost_score: 12
    base_url: "http://127.0.0.1:11434"
    timeout_sec: 120

  local_qwen35:
    type: "local"
    model: "qwen3.5:9b"
    justification: "recent, extraction, marge qualite"
    cost_score: 14
    base_url: "http://127.0.0.1:11434"
    timeout_sec: 120

  local_mistral_nemo:
    type: "local"
    model: "mistral-nemo:12b"
    justification: "contexte, sorties regulieres, cas denses"
    cost_score: 16
    base_url: "http://127.0.0.1:11434"
    timeout_sec: 120

  local_ministral_14b:
    type: "local"
    model: "ministral-3:14b"
    justification: "mistral, extraction structuree, metier"
    cost_score: 20
    base_url: "http://127.0.0.1:11434"
    timeout_sec: 180

  local_mistral_small32:
    type: "local"
    model: "mistral-small3.2:24b"
    justification: "generaliste, qualite, CoVeX"
    cost_score: 28
    base_url: "http://127.0.0.1:11434"
    timeout_sec: 240

  local_gemma4_26b:
    type: "local"
    model: "gemma4:26b"
    justification: "robustesse, ambiguites, extraction fine"
    cost_score: 30
    base_url: "http://127.0.0.1:11434"
    timeout_sec: 240

  local_command_r:
    type: "local"
    model: "command-r:35b"
    justification: "instruction, documents longs, exigeant"
    cost_score: 40
    base_url: "http://127.0.0.1:11434"
    timeout_sec: 300


  # Remote models, ordered from cheapest to most expensive.
  # Remote `cost_score` values are approximate relative scores derived from current llm-advisor
  # pricing snapshots, using input + output price per 1M tokens.

  remote_groq_llama31_8b_instant:
    type: "remote"
    model: "llama-3.1-8b-instant"
    justification: "prix minimal, tres rapide, extraction"
    cost_score: 1
    base_url: "https://api.groq.com/openai/v1"
    auth_env_var: "COVEX_GROQ_API_KEY"

  remote_groq_gpt_oss_20b:
